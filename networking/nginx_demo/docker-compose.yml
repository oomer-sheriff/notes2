version: '3.8'

services:
  nginx:
    image: nginx:latest
    # Map port 8080 on your host machine to port 80 inside the Nginx container
    ports:
      - "8080:80"
    volumes:
      # Inject our custom config file into the container
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2

  backend1:
    build: .
    environment:
      - SERVER_NAME=Backend-Server-1

  backend2:
    build: .
    environment:
      - SERVER_NAME=Backend-Server-2
