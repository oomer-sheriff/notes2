apiVersion: v1
kind: Pod
metadata:
  name: secret-vol-demo
  namespace: lab-sec
spec:
  containers:
  - name: app
    image: busybox:1.35
    command: ['sh', '-c', 'sleep 3600']
    volumeMounts:
    - name: secrets
      mountPath: /etc/app-secrets
      readOnly: true
    resources:
      requests:
        memory: "32Mi"
        cpu: "50m"
      limits:
        memory: "64Mi"
        cpu: "100m"

  volumes:
  - name: secrets
    secret:
      secretName: db-creds
      defaultMode: 0400 