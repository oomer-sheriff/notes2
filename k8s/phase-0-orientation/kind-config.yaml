kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k8s-multinode
nodes:
  - role: control-plane
    # Port mappings allow you to access NodePort services from your Windows browser
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      - containerPort: 30443
        hostPort: 30443
        protocol: TCP
      - containerPort: 30000
        hostPort: 30000
        protocol: TCP
  - role: worker
    labels:
      # Used in Phase 6 affinity/nodeSelector labs
      disktype: ssd
      zone: us-east-1a
  - role: worker
    labels:
      disktype: hdd
      zone: us-east-1b
